  const col = _sigGetCol('pt-sigc-'+pid, '#3fb950');
  const el  = document.getElementById(`pt-sig-preview-${pid}`);
  if (el) el.innerHTML = v !== '' ? signalBadge({value: v, color: col}) : '';
}
function ptSaveSignal(pid) {
  const p = getPoint(pid);
  if (!p) return;
  const v   = document.getElementById(`pt-sig-inp-${pid}`)?.value;
  const col = _sigGetCol('pt-sigc-'+pid, '#3fb950');
  p.signal  = v !== '' && v !== undefined ? {value: v, color: col} : null;
  save();
  const badge = document.getElementById(`pt-sig-badge-${pid}`);
  if (badge) badge.innerHTML = signalBadge(p.signal) || '<span style="color:var(--dim);font-size:12px">не измерен</span>';
  const el = document.getElementById(`pt-sig-edit-${pid}`);
  if (el) el.style.display = 'none';
}
function ptCancelSignal(pid) {
  const el = document.getElementById(`pt-sig-edit-${pid}`);
  if (el) el.style.display = 'none';
}

function sbSavePort(pid, si, pi) {
  const p   = getPoint(pid);
  const spl = _getSplitters(p)[si];
  const s   = spl.subs[pi];
  s.address = document.getElementById(`ep-addr-${pi}`)?.value.trim() || '';
  s.person  = document.getElementById(`ep-per-${pi}`)?.value.trim()  || '';
  s.phone   = document.getElementById(`ep-ph-${pi}`)?.value.trim()   || '';
  s.status  = document.getElementById(`ep-stat-${pi}`)?.value        || 'free';
  const sigVal = document.getElementById(`ep-sig-${pi}`)?.value;
  const sigCol = _sigGetCol('ep-sigc-'+pi, '#3fb950');
  s.signal  = sigVal !== '' && sigVal !== undefined ? {value: sigVal, color: sigCol} : null;
  // Write back if using new format
  if (p.splitters && p.splitters[si]) p.splitters[si].subs[pi] = s;
  save();
  refreshMarker(pid);
  // Sync linked subscriber marker if port has subscriberId
  if (s.subscriberId) refreshMarker(s.subscriberId);
  const key = `${pid}-${si}`;
  document.getElementById(`spl-ports-${pid}-${si}`).innerHTML = renderPortList(p, si, !!_sbShowFree[key]);
}

function sbCancelEdit(pid, si, pi) {
  const p   = getPoint(pid);
  const key = `${pid}-${si}`;
  document.getElementById(`spl-ports-${pid}-${si}`).innerHTML = renderPortList(p, si, !!_sbShowFree[key]);
}

function sbDeletePort(pid, si, pi) {
  const p   = getPoint(pid);
  const spl = _getSplitters(p)[si];
  if (!spl) return;
  spl.subs.splice(pi, 1);
  spl.subs.forEach((s,i) => s.port = i+1);
  spl.portsTotal = spl.subs.length;
  if (p.splitters && p.splitters[si]) { p.splitters[si].subs = spl.subs; p.splitters[si].portsTotal = spl.subs.length; }
  save();
  refreshMarker(pid);
  const key = `${pid}-${si}`;
  document.getElementById(`spl-ports-${pid}-${si}`).innerHTML = renderPortList(p, si, !!_sbShowFree[key]);
}

function sbAddPort(pid, si) {
  const p   = getPoint(pid);
  const spl = _getSplitters(p)[si];
  if (!spl) return;
  const idx = spl.subs.length;
  const newPort = {
    address:'', person:'', port: idx+1, status:'free', phone:'',
    fiberColor: FIBER_COLORS[idx % 12].id
  };
  spl.subs.push(newPort);
  spl.portsTotal = spl.subs.length;
  if (p.splitters && p.splitters[si]) { p.splitters[si].subs = spl.subs; p.splitters[si].portsTotal = spl.subs.length; }
  save();
  refreshMarker(pid);
  // Show free ports to see the new one
  _sbShowFree[`${pid}-${si}`] = true;
  document.getElementById(`spl-ports-${pid}-${si}`).innerHTML = renderPortList(p, si, true);
  const btn = document.getElementById(`btn-free-${pid}-${si}`);
  if (btn) btn.textContent = 'Свободные: видны';
}


// ═══════════════════════════════
// PHOTOS — фото объекта
// ═══════════════════════════════
let modalPhotos = [];

function fmEscape(v) {
  return String(v ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}

function normalizePhotos(p) {
  if (!p.photos) p.photos = [];
  if (!Array.isArray(p.photos)) p.photos = [];
  return p.photos;
}

function renderPhotosBlock(p) {
  const photos = normalizePhotos(p);
  if (!photos.length) {
    return `<div class="subs-title">Фото объекта</div><div class="photo-empty">Фото ещё не добавлены</div>`;
  }
  return `<div class="subs-title">Фото объекта</div>
    <div class="photo-grid">
      ${photos.map((ph,i)=>`
        <div class="photo-thumb ${i===0?'avatar':''}" onclick="openPhotoViewer('${p.id}',${i})" title="${fmEscape(ph.caption || (i===0?'Аватар':'Фото'))}">
          <img src="${ph.data}" alt="${fmEscape(ph.caption||'Фото')}">
          <div class="photo-label">${i===0?'⭐ ':''}${fmEscape(ph.caption || (i===0?'Аватар':'Фото '+(i+1)))}</div>
        </div>`).join('')}
    </div>`;
}

function renderPhotoEditor() {
  const box = document.getElementById('photos-editor');
  if (!box) return;
  const photos = modalPhotos || [];
  box.innerHTML = `
    <input id="f-photos-file" type="file" accept="image/*" multiple style="display:none" onchange="handlePhotoFiles(this.files);this.value=''">
    <button type="button" class="btn-add-sub" onclick="document.getElementById('f-photos-file').click()">📷 Добавить фото</button>
    <div class="form-hint">Первое фото — аватар объекта. Его видно первым в карточке.</div>
    ${photos.length ? `<div class="photo-edit-list" style="margin-top:10px;">
      ${photos.map((ph,i)=>`
        <div class="photo-edit-item">
          <img src="${ph.data}" alt="Фото">
          <div class="photo-edit-fields">
            <input class="form-input" style="padding:7px 9px;font-size:13px" placeholder="Подпись: снаружи, внутри, кассета, сварки..."
              value="${fmEscape(ph.caption||'')}" oninput="modalPhotos[${i}].caption=this.value">
            <div class="photo-edit-actions">
              ${i>0?`<button type="button" class="photo-mini-btn" onclick="setAvatarPhoto(${i})">⭐ Сделать аватаром</button>`:`<button type="button" class="photo-mini-btn">⭐ Аватар</button>`}
              ${i>0?`<button type="button" class="photo-mini-btn" onclick="movePhoto(${i},-1)">↑</button>`:''}
              ${i<photos.length-1?`<button type="button" class="photo-mini-btn" onclick="movePhoto(${i},1)">↓</button>`:''}
              <button type="button" class="photo-mini-btn danger" onclick="removePhoto(${i})">Удалить</button>
            </div>
          </div>
        </div>`).join('')}
    </div>` : `<div class="photo-empty" style="margin-top:10px;">Пока фото нет</div>`}`;
}

function setAvatarPhoto(i) {
  if (i <= 0 || !modalPhotos[i]) return;
  const [ph] = modalPhotos.splice(i, 1);
  modalPhotos.unshift(ph);
  renderPhotoEditor();
}
function movePhoto(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= modalPhotos.length) return;
  [modalPhotos[i], modalPhotos[j]] = [modalPhotos[j], modalPhotos[i]];
  renderPhotoEditor();
}
function removePhoto(i) {
  modalPhotos.splice(i, 1);
  renderPhotoEditor();
}

function compressImageFile(file, maxSize=1600, quality=0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let w = img.width, h = img.height;
        const k = Math.min(1, maxSize / Math.max(w, h));
        w = Math.round(w * k); h = Math.round(h * k);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoFiles(files) {
  const arr = Array.from(files || []);
  if (!arr.length) return;
  for (const file of arr) {
    if (!file.type.startsWith('image/')) continue;
    const data = await compressImageFile(file);
    modalPhotos.push({
      id: 'photo_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      data,
      caption: file.name.replace(/\.[^.]+$/, '').slice(0, 40),
      created: Date.now()
    });
  }
  renderPhotoEditor();
}

  const p = getPoint(pointId);

  const ph = p.photos[index];

  document.getElementById('photo-viewer-title').textContent = ph.caption || (index===0 ? 'Аватар' : 'Фото '+(index+1));
  document.getElementById('photo-viewer').classList.add('open');

        <span style="font-family:var(--mono);font-size:11px;color:var(--dim);width:18px;flex-shrink:0">${s.port}</span>
        ${fcHex ? `<div style="width:12px;height:12px;border-radius:50%;background:${fcHex};border:2px solid rgba(255,255,255,.3);flex-shrink:0"></div>` : `<div style="width:12px;height:12px;border-radius:50%;background:var(--border);border:2px dashed var(--dim);flex-shrink:0" title="цвет не задан"></div>`}
        <input type="text" placeholder="Адрес (ул. Ленина 12, кв.5)" value="${s.address||''}"
          oninput="modalSplitters[${si}].subs[${pi}].address=this.value"
          style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;padding-bottom:2px;min-width:0">
        <select onchange="modalSplitters[${si}].subs[${pi}].status=this.value;renderSubsForSplitter(${si})"
          style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text);font-size:11px;font-family:var(--mono);cursor:pointer;flex-shrink:0">
          ${statusOpts.map(st=>`<option value="${st}" ${s.status===st?'selected':''}>${statusLabel[st]}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;padding-left:26px">
        <input type="text" placeholder="ФИО / Компания" value="${s.person||''}"
          oninput="modalSplitters[${si}].subs[${pi}].person=this.value"
          style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;padding-bottom:2px;min-width:0">
        <input type="text" placeholder="тел." value="${s.phone||''}"
          oninput="modalSplitters[${si}].subs[${pi}].phone=this.value"
          style="width:90px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:11px;outline:none;padding-bottom:2px">
      </div>
      <div style="display:flex;gap:5px;align-items:center;padding-left:26px">
        <span style="font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0">Волокно:</span>
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          <div onclick="modalSplitters[${si}].subs[${pi}].fiberColor=null;renderSubsForSplitter(${si})"
            title="Без цвета" style="width:16px;height:16px;border-radius:50%;background:var(--border);cursor:pointer;
            border:2px solid ${!s.fiberColor?'#fff':'rgba(255,255,255,.1)'};flex-shrink:0;font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--dim)">✕</div>
          ${FIBER_COLORS.map(c=>`<div onclick="modalSplitters[${si}].subs[${pi}].fiberColor='${c.id}';renderSubsForSplitter(${si})"
            title="${c.name}" style="width:16px;height:16px;border-radius:50%;background:${c.hex};cursor:pointer;
            border:2px solid ${s.fiberColor===c.id?'#fff':'rgba(255,255,255,.1)'};
            box-shadow:${s.fiberColor===c.id?'0 0 0 2px '+c.hex:'none'};flex-shrink:0"></div>`).join('')}
        </div>
        <span style="font-family:var(--mono);font-size:10px;color:${fcHex||'var(--dim)'};font-weight:600">${fcName||'не задан'}</span>
      </div>
    </div>`;
  }).join('');
}

function changeSplitterPorts(si, count) {
  const n = parseInt(count);
  const spl = modalSplitters[si];
  while (spl.subs.length < n) {
    const idx = spl.subs.length;
    spl.subs.push({address:'',person:'',port:idx+1,status:'free',phone:'',fiberColor:FIBER_COLORS[idx%12].id});
  }
  if (spl.subs.length > n) spl.subs = spl.subs.slice(0,n);
  spl.subs.forEach((s,i)=>s.port=i+1);
  spl.portsTotal = n;
  renderSubsForSplitter(si);
}

function addSplitterToBox() {
  modalSplitters.push(_newSplitter('subscriber', 8));
  renderSplittersEditor();
}

function removeSplitter(si) {
  if (modalSplitters.length <= 1) return;
  modalSplitters.splice(si, 1);
  renderSplittersEditor();
}

function addSubToSplitter(si) {
  const spl = modalSplitters[si];
  const idx = spl.subs.length;
  spl.subs.push({address:'',person:'',port:idx+1,status:'free',phone:'',fiberColor:FIBER_COLORS[idx%12].id});
  spl.portsTotal = spl.subs.length;
  renderSubsForSplitter(si);
}

function savePoint() {
  const name    = document.getElementById('f-name')?.value.trim() || '';
  const comment = document.getElementById('f-comment')?.value.trim() || '';
  const muffType = document.getElementById('f-muff-type')?.value || 'transit';

  if (editingId) {
    const p = getPoint(editingId);
    if (!p) return;
    p.name = name; p.comment = comment;
    p.photos = JSON.parse(JSON.stringify(modalPhotos || []));
    if (p.type === 'muff') p.muffType = muffType;
    if (p.type === 'splitter') {
      p.splitters = JSON.parse(JSON.stringify(modalSplitters));
      p.portsTotal = undefined; p.subs = undefined; // clear legacy fields
    }
    save(); refreshMarker(editingId); renderStats(); openSidebar(editingId);
  } else {
    const latlng = pendingLatLng || map.getCenter();
    const id = 'pt_' + Date.now();
    const newPt = { id, type:modalType, lat:latlng.lat, lng:latlng.lng, name, comment, photos: JSON.parse(JSON.stringify(modalPhotos || [])) };
    if (modalType === 'muff') {
      newPt.muffType = muffType;
    } else if (modalType === 'splitter') {
      newPt.splitters = JSON.parse(JSON.stringify(modalSplitters));
    }
    points.push(newPt);
    save(); refreshMarker(id); renderStats(); pendingLatLng = null; openSidebar(id);
  }
  closeModal();
}

function deletePoint(id) {
  if (!confirm('Удалить эту точку?')) return;
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  points = points.filter(p=>p.id!==id);
  save();
  renderStats();
  closeSidebar();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingLatLng = null;
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// LOCATE — кнопка + маркер позиции
// ═══════════════════════════════
let myLocationMarker = null;

function showLocToast(msg) {
  let t = document.getElementById('loc-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'loc-toast';
    t.style.cssText = `
      position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      background:#1c2128;border:1px solid #e09b3d;color:#ffddb3;
      border-radius:10px;padding:10px 16px;font-size:13px;z-index:800;
      max-width:300px;text-align:center;line-height:1.5;
      box-shadow:0 4px 16px rgba(0,0,0,.5);
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.style.display='none',400); }, 5000);
}

function goToMyLocation() {
  const btn = document.getElementById('my-loc-btn');
  btn.classList.add('locating');
  btn.textContent = '⏳';

  if (!navigator.geolocation) {
    alert('Геолокация не поддерживается браузером');
    btn.classList.remove('locating');
    btn.textContent = '🟢';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      // Перемещаем карту
      map.setView([lat, lng], 17, {animate: true});

      // Убираем старый маркер
      if (myLocationMarker) map.removeLayer(myLocationMarker);

      // Создаём пульсирующий зелёный маркер
      const icon = L.divIcon({
        html: `<div style="
          position:relative;width:20px;height:20px;
          display:flex;align-items:center;justify-content:center">
          <div style="
            position:absolute;width:36px;height:36px;border-radius:50%;
            background:rgba(63,185,80,.25);border:1.5px solid rgba(63,185,80,.5);
            top:50%;left:50%;transform:translate(-50%,-50%);
            animation:myLocPulse 1.8s ease-in-out infinite"></div>
          <div style="
            width:16px;height:16px;border-radius:50%;
            background:#3fb950;border:3px solid #fff;
            box-shadow:0 2px 8px rgba(0,0,0,.5);
            position:relative;z-index:1"></div>
        </div>`,
        className: '',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      });

      myLocationMarker = L.marker([lat, lng], {icon, zIndexOffset: 1000});
      myLocationMarker.addTo(map);
      myLocationMarker.bindPopup(`
        <div style="font-family:monospace;font-size:12px;line-height:1.6;color:#222">
          <b style="color:#3fb950">📍 Вы здесь</b><br>
          ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
          Точность: ±${Math.round(acc)}м
        </div>`, {closeButton:false}
      ).openPopup();

      btn.classList.remove('locating');
      btn.textContent = '🟢';
    },
    err => {
      btn.classList.remove('locating');
      btn.textContent = '🟢';
      if (err.code === 1) {
        // Permission denied — likely iframe restriction
        showLocToast('⚠️ Откройте файл напрямую в браузере телефона — геолокация не работает в предпросмотре');
      } else if (err.code === 2) {
        showLocToast('📡 Не удалось определить местоположение — проверьте GPS');
      } else {
        showLocToast('⏱ Таймаут — попробуйте ещё раз на улице');
      }
    },
    {enableHighAccuracy: true, timeout: 10000}
  );
}

// Функция экспорта данных в файл
function exportData() {
  const data = localStorage.getItem(PROJ_KEY);
  if (!data || data === '[]') {
    alert('Нет данных для экспорта.');
    return;
  }
  
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  
  a.href = url;
  a.download = `fibermap_export_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Функция импорта данных из файла
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedData = JSON.parse(e.target.result);
      
      // Проверка структуры (опционально, но рекомендуется)
      if (!Array.isArray(importedData)) throw new Error('Некорректный формат данных');
      
      if (confirm('Внимание: импорт полностью перезапишет существующие проекты. Продолжить?')) {
        localStorage.setItem(PROJ_KEY, JSON.stringify(importedData));
        alert('Данные успешно импортированы!');
        location.reload(); // Перезагрузка для обновления списка
      }
    } catch (err) {
      alert('Ошибка при чтении файла. Убедитесь, что это корректный JSON-файл FiberMap.');
    }
  };
  reader.readAsText(file);
}
