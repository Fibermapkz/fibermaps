<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FBMap — управление портами</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --panel: #161b22;
  --card: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --dim: #7d8590;
  --blue: #388bfd;
  --blue-light: #cae8ff;
  --orange: #e09b3d;
  --orange-light: #ffddb3;
  --green: #3fb950;
  --green-light: #aff5b4;
  --pink: #db61a2;
  --pink-light: #ffd6f0;
  --red: #f85149;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Manrope', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:var(--sans); background:var(--bg); color:var(--text); }

/* LAYOUT */
#app { display:flex; flex-direction:column; height:100vh; }
#topbar {
  height:52px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 12px; gap:10px; z-index:1000; flex-shrink:0;
}
.logo { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--blue); letter-spacing:1px; white-space:nowrap; }
.logo span { color:var(--dim); }

.stats-bar { display:flex; gap:6px; flex:1; overflow-x:auto; scrollbar-width:none; }
.stats-bar::-webkit-scrollbar { display:none; }
/* STAT CHIPS — clickable */
.stat-chip {
  display:flex; align-items:center; gap:5px; padding:4px 10px;
  border-radius:20px; border:1px solid var(--border);
  font-family:var(--mono); font-size:11px; white-space:nowrap; flex-shrink:0;
  background:var(--card); cursor:pointer; transition:all .15s;
}
.stat-chip:hover { border-color:var(--dim); }
.stat-chip.active-chip { border-color:currentColor; }
.stat-chip .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.stat-chip .val { font-weight:700; color:var(--text); }
.stat-chip .lbl { color:var(--dim); }

/* LIST PANEL */
#list-panel {
  position:absolute; bottom:0; left:0; right:0; z-index:700;
  background:var(--panel); border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:48vh; display:flex; flex-direction:column;
  will-change:transform;
}
#list-panel.open { transform:translateY(0) !important; }
.lp-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:10px auto 0; }
.lp-head {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px 10px; border-bottom:1px solid var(--border);
}
.lp-title { font-size:15px; font-weight:700; flex:1; }
.lp-count { font-family:var(--mono); font-size:12px; color:var(--dim); }
.lp-close {
  background:var(--card); border:1px solid var(--border); color:var(--dim);
  border-radius:6px; padding:5px 10px; cursor:pointer; font-size:16px;
}
.lp-close:hover { color:var(--text); }
.lp-body { overflow-y:auto; flex:1; }
.lp-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer; transition:background .12s;
}
.lp-item:hover { background:rgba(255,255,255,.03); }
.lp-item:last-child { border-bottom:none; }
.lp-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.lp-info { flex:1; min-width:0; }
.lp-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lp-meta { font-family:var(--mono); font-size:11px; color:var(--dim); margin-top:2px; }
.lp-badge {
  font-family:var(--mono); font-size:10px; font-weight:700;
  padding:3px 8px; border-radius:4px; flex-shrink:0; white-space:nowrap;
}
.lp-empty { text-align:center; padding:40px 20px; color:var(--dim); font-size:14px; }

.btn-add {
  background:var(--blue); color:#fff; border:none; cursor:pointer;
  padding:8px 14px; border-radius:8px; font-family:var(--sans);
  font-size:13px; font-weight:600; white-space:nowrap; flex-shrink:0;
  display:flex; align-items:center; gap:6px;
}
.btn-add:hover { filter:brightness(1.15); }

/* MAP */
#map-wrap { flex:1; position:relative; overflow:hidden; }
#map { width:100%; height:100%; }

/* FILTER BAR */
#filter-bar {
  position:absolute; bottom:70px; left:10px;
  z-index:500; display:flex; gap:6px;
  flex-direction:column;
  background:var(--panel);
  border:1px solid var(--border); border-radius:10px; padding:6px 8px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.filter-btn {
  display:flex; align-items:center; gap:5px; padding:5px 10px;
  border-radius:6px; border:1px solid transparent; cursor:pointer;
  font-size:11px; font-weight:600; background:transparent; color:var(--dim);
  transition:all .15s; white-space:nowrap; width:100%;
}
.filter-btn.on { color:var(--text); }
.filter-btn .dot { width:8px; height:8px; border-radius:50%; }
.filter-btn.all.on { background:rgba(255,255,255,.08); border-color:var(--border); }
.filter-btn.blue.on { background:rgba(56,139,253,.15); border-color:rgba(56,139,253,.4); color:var(--blue-light); }
.filter-btn.orange.on { background:rgba(224,155,61,.15); border-color:rgba(224,155,61,.4); color:var(--orange-light); }
.filter-btn.green.on { background:rgba(63,185,80,.15); border-color:rgba(63,185,80,.4); color:var(--green-light); }
.filter-btn.pink.on { background:rgba(219,97,162,.15); border-color:rgba(219,97,162,.4); color:var(--pink-light); }

/* SIDEBAR — always bottom sheet */
#sidebar {
  position:absolute; bottom:0; left:0; right:0; z-index:800;
  background:var(--panel); border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:75vh; display:flex; flex-direction:column;
  will-change:transform;
}
#sidebar.open { transform:translateY(0) !important; }
.sidebar-handle {
  width:36px; height:4px; background:var(--border); border-radius:2px;
  margin:10px auto 0;
}
.sidebar-head {
  display:flex; align-items:center; gap:10px; padding:12px 16px 8px;
  border-bottom:1px solid var(--border);
}
.type-badge {
  font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:1px;
  padding:3px 8px; border-radius:4px;
}
.sidebar-title { font-size:16px; font-weight:700; flex:1; }
.sidebar-close {
  background:var(--card); border:1px solid var(--border); color:var(--dim);
  border-radius:6px; padding:5px 10px; cursor:pointer; font-size:16px;
}
.sidebar-close:hover { color:var(--text); }
.sidebar-body { overflow-y:auto; padding:12px 16px; flex:1; }

/* PORT BAR */
.port-bar-wrap { margin-bottom:14px; }
.port-bar-labels { display:flex; justify-content:space-between; font-family:var(--mono); font-size:11px; color:var(--dim); margin-bottom:6px; }
.port-bar-labels .free { color:var(--green); font-weight:700; }
.port-bar { height:10px; background:var(--card); border-radius:5px; overflow:hidden; border:1px solid var(--border); }
.port-bar-fill { height:100%; border-radius:4px; transition:width .4s; }

/* FIELDS */
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.field-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
.field-label { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.field-value { font-size:13px; font-weight:600; color:var(--text); word-break:break-word; }

/* SUBSCRIBERS */
.subs-title { font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.sub-list { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.sub-item {
  display:flex; align-items:center; gap:10px;
  background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 12px;
}
.sub-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.sub-info { flex:1; min-width:0; }
.sub-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sub-meta { font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:1px; }
.sub-status { font-family:var(--mono); font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; flex-shrink:0; }
.status-active   { background:rgba(63,185,80,.15);  color:var(--green); }
.status-off      { background:rgba(224,155,61,.15); color:var(--orange); }
.status-off-free { background:rgba(248,81,73,.15);  color:var(--red); }
.status-free     { background:rgba(56,139,253,.1);  color:var(--blue); }

/* COMMENTS */
.comment-box { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:12px; }
.comment-text { font-size:13px; color:var(--dim); line-height:1.5; }

/* ACTION BTNS */
.action-row { display:flex; gap:8px; padding-bottom:16px; }
.btn { border:none; cursor:pointer; border-radius:8px; padding:10px 16px; font-family:var(--sans); font-size:13px; font-weight:600; flex:1; }
.btn-edit { background:var(--card); border:1px solid var(--border); color:var(--text); }
.btn-edit:hover { border-color:var(--blue); color:var(--blue); }
.btn-del { background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3); color:var(--red); }
.btn-del:hover { background:rgba(248,81,73,.2); }


/* PHOTOS */
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.photo-thumb {
  position:relative; aspect-ratio:1/1; border-radius:10px; overflow:hidden;
  border:1px solid var(--border); background:var(--card); cursor:pointer;
}
.photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-thumb.avatar { box-shadow:0 0 0 2px var(--blue); }
.photo-thumb .photo-label {
  position:absolute; left:0; right:0; bottom:0; padding:4px 6px;
  background:linear-gradient(transparent,rgba(0,0,0,.78));
  color:#fff; font-size:10px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.photo-empty { border:1px dashed var(--border); border-radius:10px; padding:16px; color:var(--dim); font-size:13px; text-align:center; margin-bottom:12px; }
.photo-edit-list { display:flex; flex-direction:column; gap:8px; }
.photo-edit-item { display:flex; gap:10px; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px; }
.photo-edit-item img { width:58px; height:58px; object-fit:cover; border-radius:8px; border:1px solid var(--border); flex-shrink:0; }
.photo-edit-fields { flex:1; min-width:0; }
.photo-edit-actions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.photo-mini-btn { background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--dim); border-radius:6px; padding:4px 8px; cursor:pointer; font-size:11px; }
.photo-mini-btn:hover { color:var(--text); border-color:var(--dim); }
.photo-mini-btn.danger { color:var(--red); border-color:rgba(248,81,73,.3); }
#photo-viewer {
  display:none; position:fixed; inset:0; z-index:1300; background:rgba(0,0,0,.9);
  align-items:center; justify-content:center; padding:18px;
}
#photo-viewer.open { display:flex; }
.photo-viewer-box { max-width:96vw; max-height:94vh; display:flex; flex-direction:column; gap:10px; align-items:center; }
#photo-viewer-img { max-width:96vw; max-height:82vh; object-fit:contain; border-radius:10px; }
#photo-viewer-title { color:#fff; font-size:14px; text-align:center; }
.photo-viewer-close { position:fixed; top:14px; right:14px; background:var(--panel); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 12px; cursor:pointer; font-size:18px; }

/* MODAL */
#modal-overlay {
  position:fixed; inset:0; z-index:900;
  background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  display:none; align-items:flex-end;
}
#modal-overlay.open { display:flex; }
#modal {
  background:var(--panel); border:1px solid var(--border);
  border-radius:16px 16px 0 0; width:100%;
  max-height:90vh; display:flex; flex-direction:column;
  animation:slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 16px 12px; border-bottom:1px solid var(--border); }
.modal-title { font-size:16px; font-weight:700; }
.modal-close { background:var(--card); border:1px solid var(--border); color:var(--dim); border-radius:6px; padding:5px 10px; cursor:pointer; font-size:16px; }
.modal-body { overflow-y:auto; padding:14px 16px; flex:1; }
.modal-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; }

/* FORM */
.form-group { margin-bottom:14px; }
.form-label { font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; display:block; }
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; color:var(--text);
  font-family:var(--sans); font-size:14px; outline:none;
  transition:border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--blue); }
.form-select { appearance:none; cursor:pointer; }
.form-textarea { resize:vertical; min-height:70px; line-height:1.5; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-hint { font-size:11px; color:var(--dim); margin-top:4px; }

/* TYPE SELECTOR */
.type-selector { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px; }
.type-opt {
  border:2px solid var(--border); border-radius:10px; padding:12px 10px;
  cursor:pointer; text-align:center; transition:all .15s; background:var(--card);
}
.type-opt:hover { border-color:var(--dim); }
.type-opt.selected-blue { border-color:var(--blue); background:rgba(56,139,253,.1); }
.type-opt.selected-orange { border-color:var(--orange); background:rgba(224,155,61,.1); }
.type-opt.selected-green { border-color:var(--green); background:rgba(63,185,80,.1); }
.type-opt.selected-brown { border-color:#8b7355; background:rgba(139,115,85,.1); }
.type-icon { font-size:24px; margin-bottom:4px; }
.type-name { font-size:12px; font-weight:600; }
.type-desc { font-size:10px; color:var(--dim); margin-top:2px; }

/* SUBS EDITOR */
.subs-editor { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
.sub-edit-item {
  display:flex; gap:8px; align-items:center;
  background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 10px;
}
.sub-edit-item input, .sub-edit-item select {
  background:transparent; border:none; color:var(--text);
  font-family:var(--sans); font-size:13px; outline:none; min-width:0;
}
.sub-edit-item .f-name { flex:2; }
.sub-edit-item .f-port { flex:1; font-family:var(--mono); font-size:12px; }
.sub-edit-item .f-status { flex:1; cursor:pointer; }
.sub-edit-del { background:none; border:none; color:var(--dim); cursor:pointer; font-size:16px; padding:0 4px; flex-shrink:0; }
.sub-edit-del:hover { color:var(--red); }
.btn-add-sub { background:rgba(56,139,253,.1); border:1px dashed rgba(56,139,253,.4); color:var(--blue); border-radius:8px; padding:8px; width:100%; cursor:pointer; font-size:13px; font-family:var(--sans); }
.btn-add-sub:hover { background:rgba(56,139,253,.2); }

/* MAP INFO TOAST */
#tap-hint {
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  background:rgba(22,27,34,.9); border:1px solid var(--border);
  border-radius:20px; padding:8px 16px;
  font-size:12px; color:var(--dim); z-index:500;
  pointer-events:none; white-space:nowrap;
  transition:opacity .3s;
}

/* LEAFLET CUSTOM */
.leaflet-container { background:#1a1f2a !important; }
.leaflet-control-zoom { border:1px solid var(--border) !important; }
.leaflet-control-zoom a { background:var(--panel) !important; color:var(--text) !important; border-bottom:1px solid var(--border) !important; }
.leaflet-control-zoom a:hover { background:var(--card) !important; }
.leaflet-control-attribution { display:none !important; }

/* CUSTOM MARKER */
.fm-marker {
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; border:3px solid #fff;
  font-size:14px; font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  cursor:pointer; transition:transform .15s;
  font-family:var(--mono);
}
.fm-marker:hover { transform:scale(1.15); }

/* LAYER SWITCHER */
#layer-switcher {
  position:absolute; top:10px; right:10px; z-index:500;
  background:var(--panel); border:1px solid var(--border);
  border-radius:10px; padding:6px 8px;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  display:flex; flex-direction:column; gap:5px;
}
.layer-label {
  font-family:var(--mono); font-size:9px; color:var(--dim);
  letter-spacing:2px; text-transform:uppercase; text-align:center;
}
.layer-btns { display:flex; flex-direction:column; gap:3px; }
.layer-btn {
  background:var(--card); border:1px solid var(--border);
  border-radius:6px; padding:5px 10px; cursor:pointer;
  font-family:var(--sans); font-size:12px; font-weight:500;
  color:var(--dim); text-align:center; transition:all .15s; white-space:nowrap;
}
.layer-btn:hover { border-color:var(--dim); color:var(--text); }
.layer-btn.active-layer {
  background:rgba(56,139,253,.15);
  border-color:var(--blue);
  color:var(--blue-light);
  font-weight:700;
}
/* PROJECT DIALOG */
.pdlg-overlay {
  display:none; position:fixed; inset:0; z-index:1100;
  background:rgba(0,0,0,.75); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
.pdlg-overlay.show { display:flex; }
.pdlg-box {
  background:#161b22; border:1px solid #30363d; border-radius:14px;
  width:90%; max-width:360px; padding:24px 20px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.pdlg-title { font-size:16px; font-weight:700; color:#e6edf3; margin-bottom:6px; }
.pdlg-sub   { font-size:13px; color:#7d8590; margin-bottom:14px; }
.pdlg-input {
  width:100%; padding:10px 12px; border-radius:8px;
  background:#1c2128; border:1px solid #30363d; color:#e6edf3;
  font-size:15px; outline:none; margin-bottom:16px;
  font-family:'Manrope',sans-serif; box-sizing:border-box;
}
.pdlg-input:focus { border-color:#388bfd; }
.pdlg-btns { display:flex; gap:8px; }
.pdlg-btn-cancel {
  flex:1; padding:10px; border-radius:8px;
  border:1px solid #30363d; background:#1c2128;
  color:#7d8590; cursor:pointer; font-size:14px;
  font-family:'Manrope',sans-serif;
}
.pdlg-btn-cancel:hover { color:#e6edf3; }
.pdlg-btn-ok {
  flex:2; padding:10px; border-radius:8px; border:none;
  background:#388bfd; color:#fff; cursor:pointer;
  font-size:14px; font-weight:600; font-family:'Manrope',sans-serif;
}
.pdlg-btn-ok:hover { filter:brightness(1.1); }
.pdlg-btn-ok.danger { background:#f85149; }

/* ROUTE EDIT BAR */
#route-bar {
  display:none; position:absolute; top:10px; left:50%;
  transform:translateX(-50%); z-index:600;
  background:#0d1117; border:1px solid #3fb950;
  border-radius:10px; padding:8px 10px;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
  align-items:center; gap:8px; flex-wrap:wrap;
  max-width:90vw;
}
#route-bar.active { display:flex; }
.route-bar-hint { font-size:12px; color:#aff5b4; white-space:nowrap; }
.route-bar-btn {
  background:#1c2128; border:1px solid #30363d; color:#e6edf3;
  border-radius:6px; padding:5px 10px; cursor:pointer;
  font-size:13px; font-family:'Manrope',sans-serif;
}
.route-bar-btn:hover { border-color:#7d8590; }
.route-bar-btn.done { background:#3fb950; border-color:#3fb950; color:#0d1117; font-weight:700; }

/* DRAG HIGHLIGHT on splitter */
.fm-marker.drag-over {
  transform:scale(1.3) !important;
  box-shadow:0 0 0 4px #3fb950, 0 2px 12px rgba(0,0,0,.6) !important;
}

#my-loc-btn {
  position: fixed;
  bottom: 24px;
  right: 16px;
  z-index: 700;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--panel);
  border: 2px solid var(--green);
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.5), 0 0 0 0 rgba(63,185,80,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
#my-loc-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 4px 20px rgba(0,0,0,.6), 0 0 0 6px rgba(63,185,80,.15);
}
#my-loc-btn:active { transform: scale(.95); }
#my-loc-btn.locating {
  animation: locBtnPulse 1s ease-in-out infinite;
}
@keyframes locBtnPulse {
  0%,100% { box-shadow: 0 4px 16px rgba(0,0,0,.5), 0 0 0 0 rgba(63,185,80,.5); }
  50%      { box-shadow: 0 4px 16px rgba(0,0,0,.5), 0 0 0 10px rgba(63,185,80,0); }
}
@keyframes myLocPulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); opacity:.8; }
  50%     { transform:translate(-50%,-50%) scale(1.6); opacity:0; }
}

/* NO POINTS */
.empty-state { text-align:center; padding:32px 20px; color:var(--dim); }
.empty-icon { font-size:40px; margin-bottom:12px; }
.empty-text { font-size:14px; line-height:1.6; }

/* ═══════════════════════════
   PROJECTS SCREEN
═══════════════════════════ */
#screen-projects {
  display:none; flex-direction:column; height:100vh;
  background:var(--bg);
}
#screen-map {
  display:none; flex-direction:column; height:100vh;
}
#screen-map.active     { display:flex; }
#screen-projects.active { display:flex; }

.proj-topbar {

  height:56px; background:var(--panel); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0;
}
.proj-logo { font-family:var(--mono); font-size:16px; font-weight:700; color:var(--blue); flex:1; }
.proj-logo span { color:var(--dim); }
.btn-new-proj {
  background:var(--blue); color:#fff; border:none; cursor:pointer;
  padding:8px 16px; border-radius:8px; font-family:var(--sans);
  font-size:13px; font-weight:600; white-space:nowrap;
}
.btn-new-proj:hover { filter:brightness(1.15); }

.proj-body { flex:1; overflow-y:auto; padding:16px; }

.proj-section-label {
  font-family:var(--mono); font-size:10px; color:var(--dim);
  letter-spacing:2px; text-transform:uppercase;
  margin-bottom:12px; padding-left:4px;
}

.proj-list { display:flex; flex-direction:column; gap:10px; }

.proj-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px 18px; cursor:pointer;
  transition:border-color .15s, transform .15s;
  display:flex; align-items:center; gap:14px; position:relative;
}
.proj-card:hover { border-color:var(--blue); transform:translateY(-1px); }
.proj-card:active { transform:scale(.98); }
.proj-icon {
  width:44px; height:44px; border-radius:12px;
  background:rgba(56,139,253,.15); border:1px solid rgba(56,139,253,.3);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.proj-info { flex:1; min-width:0; }
.proj-name { font-size:16px; font-weight:700; margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.proj-stats { display:flex; gap:10px; flex-wrap:wrap; }
.proj-stat {
  font-family:var(--mono); font-size:11px; color:var(--dim);
  display:flex; align-items:center; gap:4px;
}
.proj-stat .dot { width:7px; height:7px; border-radius:50%; }
.proj-date { font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:4px; }
.proj-arrow { color:var(--dim); font-size:18px; flex-shrink:0; }
.proj-actions {
  display:flex; gap:6px; flex-shrink:0;
}
.proj-btn {
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:6px 10px; cursor:pointer;
  font-size:14px; color:var(--dim); transition:all .15s;
}
.proj-btn:hover { border-color:var(--dim); color:var(--text); }
.proj-btn.danger:hover { border-color:var(--red); color:var(--red); }

.proj-empty {
  text-align:center; padding:60px 20px; color:var(--dim);
}
.proj-empty-icon { font-size:48px; margin-bottom:16px; }
.proj-empty-text { font-size:14px; line-height:1.7; }
.proj-empty-text b { color:var(--text); }

/* MAP TOPBAR with back btn */
.back-btn {
  background:var(--card); border:1px solid var(--border); color:var(--dim);
  border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px;
  font-weight:600; white-space:nowrap; display:flex; align-items:center; gap:5px;
  flex-shrink:0;
}
.back-btn:hover { border-color:var(--blue); color:var(--blue); }
.proj-name-tag {
  font-family:var(--mono); font-size:12px; color:var(--dim);
  background:rgba(56,139,253,.1); border:1px solid rgba(56,139,253,.2);
  border-radius:6px; padding:3px 10px; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; max-width:120px;
}

@media(min-width:600px) {
  #modal-overlay { align-items:center; }
  #modal { max-width:480px; margin:auto; border-radius:16px; max-height:80vh; }
  #sidebar { max-height:60vh; }
  .proj-list { display:grid; grid-template-columns:1fr 1fr; }
}

#sidebar {
    transition: transform 0.3s ease, width 0.3s ease;
}
#sidebar.collapsed {
    transform: translateX(-100%);
}
#toggle-sidebar-btn {
    position: absolute;
    right: -40px;
    top: 10px;
    width: 35px;
    height: 35px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 5px 5px 0;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
}

</style>
</head>
<body>
<!-- ══════════════════════════════════
     PROJECTS SCREEN
══════════════════════════════════ -->
<div id="screen-projects" class="active">
  <div class="proj-topbar">
    <div class="proj-logo">Fiber<span>Map</span></div>
  
  <button class="proj-btn" onclick="exportData()" title="Экспорт данных">📤</button>
  <button class="proj-btn" onclick="document.getElementById('import-file').click()" title="Импорт данных">📥</button>
  <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
    <button class="btn-new-proj" onclick="createProject()">+ Новый проект</button>
  </div>
  <div class="proj-body">
    <div class="proj-section-label" id="proj-section-lbl">Проекты</div>
    <div class="proj-list" id="proj-list"></div>
  </div>
</div>

<!-- ══════════════════════════════════
     MAP SCREEN
══════════════════════════════════ -->
<div id="screen-map">
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <button class="back-btn" onclick="goToProjects()">← Проекты</button>
    <div class="proj-name-tag" id="current-proj-name">—</div>
    <div class="stats-bar" id="stats-bar"></div>
    <button class="btn-add" onclick="openAddModal()">+ Добавить</button>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>

    <!-- LAYER SWITCHER -->
    <div id="layer-switcher">
      <div class="layer-label">Карта</div>
      <div class="layer-btns">
        <button class="layer-btn" data-layer="twogis"   onclick="setTileLayer('twogis')">2GIS</button>
        <button class="layer-btn" data-layer="satellite" onclick="setTileLayer('satellite')">Спутник</button>
        <button class="layer-btn" data-layer="osm"      onclick="setTileLayer('osm')">OSM</button>
      </div>
    </div>

    <!-- ROUTE EDIT TOOLBAR -->
    <div id="route-bar">
      <span class="route-bar-hint">📍 Нажимайте на карту — добавляете точки кабеля</span>
      <button class="route-bar-btn" onclick="undoRoutePoint()">↩</button>
      <button class="route-bar-btn" onclick="clearRoutePoints()">🗑</button>
      <button class="route-bar-btn done" onclick="finishRouteEdit()">✓ Готово</button>
      <button class="route-bar-btn" onclick="cancelRouteEdit()">✕</button>
    </div>

    <!-- FILTER BAR -->
    <div id="filter-bar">
      <button class="filter-btn all on" data-f="all" onclick="setFilter('all',this)">Все</button>
      <button class="filter-btn blue" data-f="splitter" onclick="setFilter('splitter',this)">
        <span class="dot" style="background:var(--blue)"></span>Сплиттеры
      </button>
      <button class="filter-btn orange" data-f="off" onclick="setFilter('off',this)">
        <span class="dot" style="background:var(--orange)"></span>Откл.
      </button>
      <button class="filter-btn green" data-f="active" onclick="setFilter('active',this)">
        <span class="dot" style="background:var(--green)"></span>Актив.
      </button>
      <button class="filter-btn pink" data-f="other" onclick="setFilter('other',this)">
        <span class="dot" style="background:var(--pink)"></span>Прочее
      </button>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
  <button id="toggle-sidebar-btn" title="Свернуть/Развернуть">☰</button>
      <div class="sidebar-handle"></div>
      <div class="sidebar-head" id="sidebar-head">
        <div class="type-badge" id="sb-badge"></div>
        <div class="sidebar-title" id="sb-title"></div>
        <button class="sidebar-close" id="sidebar-close-btn">✕</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
    </div>

    <!-- LIST PANEL -->
    <div id="list-panel">
      <div class="lp-handle"></div>
      <div class="lp-head">
        <div class="lp-title" id="lp-title">Все точки</div>
        <div class="lp-count" id="lp-count"></div>
        <button class="lp-close" id="lp-close-btn">✕</button>
      </div>
      <div class="lp-body" id="lp-body"></div>
    </div>

    <!-- LOCATION BUTTON -->
    <button id="my-loc-btn" onclick="goToMyLocation()" title="Моё местоположение">🟢</button>

    <!-- TAP HINT -->
    <div id="tap-hint">Нажмите на карту чтобы добавить точку</div>
  </div>
</div><!-- /#app -->
</div><!-- /#screen-map -->

<!-- PROJECT DIALOG -->
<div id="pdlg" class="pdlg-overlay">
  <div class="pdlg-box">
    <div class="pdlg-title" id="pdlg-title">Новый проект</div>
    <div class="pdlg-sub" id="pdlg-sub"></div>
    <input id="pdlg-input" class="pdlg-input" type="text" placeholder="Название проекта"
      onkeydown="if(event.key==='Enter')pdlgOk()">
    <div class="pdlg-btns">
      <button class="pdlg-btn-cancel" onclick="pdlgCancel()">Отмена</button>
      <button class="pdlg-btn-ok" id="pdlg-ok-btn" onclick="pdlgOk()">Создать</button>
    </div>
  </div>
</div>


<!-- PHOTO VIEWER -->
<div id="photo-viewer" onclick="closePhotoViewer(event)">
  <button class="photo-viewer-close" onclick="closePhotoViewer()">✕</button>
  <div class="photo-viewer-box">
    <img id="photo-viewer-img" alt="Фото точки">
    <div id="photo-viewer-title"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Добавить точку</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-edit" style="flex:1" onclick="closeModal()">Отмена</button>
      <button class="btn" style="background:var(--blue);color:#fff;flex:2" onclick="savePoint()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
// PROJECT STORAGE
// ═══════════════════════════════
const PROJ_KEY = 'fibermap_projects_v1';
let projects    = [];   // all projects
let currentProj = null; // active project object
let points      = [];   // reference to currentProj.points

// Стандартные цвета волокон (12 цветов по стандарту)
const FIBER_COLORS = [
  { id:'blue',    name:'Синий',      hex:'#2563c4' },
  { id:'orange',  name:'Оранжевый',  hex:'#e09b3d' },
  { id:'green',   name:'Зелёный',    hex:'#3fb950' },
  { id:'brown',   name:'Коричневый', hex:'#8B5A2B' },
  { id:'gray',    name:'Серый',      hex:'#8a9099' },
  { id:'white',   name:'Белый',      hex:'#d0d7de' },
  { id:'red',     name:'Красный',    hex:'#f85149' },
  { id:'black',   name:'Чёрный',     hex:'#555e68' },
  { id:'yellow',  name:'Жёлтый',     hex:'#e3b341' },
  { id:'violet',  name:'Фиолетовый', hex:'#9f7aea' },
  { id:'pink',    name:'Розовый',    hex:'#db61a2' },
  { id:'teal',    name:'Бирюзовый',  hex:'#00b4d8' },
];

function fiberColorInfo(id) {
  return FIBER_COLORS.find(c=>c.id===id) || null;
}

// ── Signal level helpers ──────────
function signalColor(s) {
  // s = {value, color} or legacy number
  if (!s) return null;
  if (typeof s === 'object') return s.color || null;
  return null; // legacy — no auto color
}
function signalBadge(s) {
  if (!s) return '';
  const val = typeof s === 'object' ? s.value : s;
  const col = typeof s === 'object' ? s.color : null;
  if (val === null || val === undefined || val === '') return '';
  const bg  = col || '#555';
  return `<span style="display:inline-flex;align-items:center;gap:3px;background:${bg}22;
    border:1px solid ${bg}55;border-radius:5px;padding:1px 6px;font-family:var(--mono);
    font-size:11px;color:${col||'var(--dim)'};font-weight:600;white-space:nowrap">${val} dBm</span>`;
}

let editingId = null;
let pendingLatLng = null;
let activeFilter = 'all';
let markers = {};
let selectedId = null;

// ── Project persistence ──────────
function loadProjects() {
  try {
    const raw = localStorage.getItem(PROJ_KEY);
    projects = raw ? JSON.parse(raw) : [];
  } catch(e) { projects = []; }
}
function saveProjects() {
  localStorage.setItem(PROJ_KEY, JSON.stringify(projects));
}

// ── Project dialog ──────────────
let _pdlgCb   = null;
let _pdlgMode = 'input'; // 'input' | 'confirm'

function pdlgShow(title, sub, placeholder, okLabel, okDanger, cb) {
  _pdlgCb   = cb;
  _pdlgMode = placeholder ? 'input' : 'confirm';
  document.getElementById('pdlg-title').textContent  = title;
  document.getElementById('pdlg-sub').textContent    = sub || '';
  const inp = document.getElementById('pdlg-input');
  inp.placeholder = placeholder || '';
  inp.value = '';
  inp.style.display = placeholder ? '' : 'none';
  const okBtn = document.getElementById('pdlg-ok-btn');
  okBtn.textContent = okLabel || 'OK';
  okBtn.className   = 'pdlg-btn-ok' + (okDanger ? ' danger' : '');
  document.getElementById('pdlg').classList.add('show');
  if (placeholder) setTimeout(()=>inp.focus(), 80);
}

function pdlgOk() {
  const val = document.getElementById('pdlg-input').value.trim();
  if (_pdlgMode === 'input' && !val) return; // require text
  document.getElementById('pdlg').classList.remove('show');
  if (_pdlgCb) _pdlgCb(val || true);
  _pdlgCb = null;
}

function pdlgCancel() {
  document.getElementById('pdlg').classList.remove('show');
  _pdlgCb = null;
}

// ── Project actions ──────────────
function createProject() {
  pdlgShow('Новый проект', '', 'Название (напр. Ардагер)', 'Создать', false, name => {
    const proj = { id:'proj_'+Date.now(), name, created:Date.now(), points:[] };
    projects.push(proj);
    saveProjects();
    renderProjectsList();
  });
}

function renameProject(id, e) {
  e && e.stopPropagation();
  const proj = projects.find(p=>p.id===id);
  if (!proj) return;
  pdlgShow('Переименовать проект', '', proj.name, 'Сохранить', false, name => {
    proj.name = name;
    saveProjects();
    renderProjectsList();
  });
}

function deleteProject(id, e) {
  e && e.stopPropagation();
  const proj = projects.find(p=>p.id===id);
  if (!proj) return;
  pdlgShow(`Удалить проект «${proj.name}»?`, 'Все точки будут удалены безвозвратно.', '', 'Удалить', true, () => {
    projects = projects.filter(p=>p.id!==id);
    saveProjects();
    renderProjectsList();
  });
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'});
}

function renderProjectsList() {
  const list = document.getElementById('proj-list');
  const lbl  = document.getElementById('proj-section-lbl');
  lbl.textContent = `Проекты (${projects.length})`;
  if (!projects.length) {
    list.innerHTML = `<div class="proj-empty">
      <div class="proj-empty-icon">📁</div>
      <div class="proj-empty-text">Проектов пока нет.<br>Нажмите <b>+ Новый проект</b> чтобы начать.</div>
    </div>`;
    return;
  }
  list.innerHTML = projects.map(proj => {
    const pts = proj.points || [];
    const spl = pts.filter(p=>p.type==='splitter');
    const freeTotal = spl.reduce((a,p)=>a+_freePorts(p),0);
    const offCount  = pts.filter(p=>p.type==='off').length;
    return `
    <div class="proj-card" onclick="openProject('${proj.id}')">
      <div class="proj-icon">📍</div>
      <div class="proj-info">
        <div class="proj-name">${proj.name}</div>
        <div class="proj-stats">
          <div class="proj-stat"><span class="dot" style="background:#388bfd"></span>${spl.length} спл.</div>
          <div class="proj-stat"><span class="dot" style="background:#3fb950"></span>${freeTotal} своб.</div>
          <div class="proj-stat"><span class="dot" style="background:#e09b3d"></span>${offCount} откл.</div>
        </div>
        <div class="proj-date">Создан ${formatDate(proj.created)}</div>
      </div>
      <div class="proj-actions">
        <button class="proj-btn" onclick="renameProject('${proj.id}',event)" title="Переименовать">✏️</button>
        <button class="proj-btn danger" onclick="deleteProject('${proj.id}',event)" title="Удалить">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function openProject(id) {
  currentProj = projects.find(p=>p.id===id);
  if (!currentProj) return;
  if (!currentProj.points) currentProj.points = [];
  points = currentProj.points;
  document.getElementById('current-proj-name').textContent = currentProj.name;

  // switch screens
  document.getElementById('screen-projects').classList.remove('active');
  document.getElementById('screen-map').classList.add('active');

  // reset state
  closeSidebar();
  closeListPanel();
  activeFilter = 'all';

  // render map
  renderMarkers();
  renderStats();

  // invalidate map size after display change
  setTimeout(()=>{
    map.invalidateSize();
    // если есть точки — показать их список снизу
    if (points.length > 0) {
      openListPanel('all');
    }
  }, 80);
}

function goToProjects() {
  // save before leaving
  saveProjects();
  // clear markers
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers = {};
  currentProj = null;
  points = [];
  closeSidebar();
  closeListPanel();
  document.getElementById('screen-map').classList.remove('active');
  document.getElementById('screen-projects').classList.add('active');
  renderProjectsList();
}

// helper freePorts without circular ref
function _freePorts(p) {
  if (p.type !== 'splitter') return 0;
  const spls = (p.splitters && p.splitters.length)
    ? p.splitters
    : [{ portsTotal: p.portsTotal||0, subs: p.subs||[] }];
  return spls.reduce((t, spl) => {
    const used = (spl.subs||[]).filter(s=>s.status==='active').length;
    return t + Math.max(0,(spl.portsTotal||0)-used);
  }, 0);
}

// ── Point access ─────────────────
function save() {
  if (currentProj) {
    currentProj.points = points;
    saveProjects();
  }
}
function getPoint(id) { return points.find(p=>p.id===id); }

// ═══════════════════════════════
// MAP
// ═══════════════════════════════
const map = L.map('map', {
  center: [51.185, 71.447],
  zoom: 16,
  zoomControl: true,
  attributionControl: false,
});

// ── TILE LAYERS ──────────────────
const TILE_LAYERS = {
  twogis: {
    label: '2GIS',
    url: 'https://tile{s}.maps.2gis.com/tiles?x={x}&y={y}&z={z}&v=1&r=g&ts=online_sd',
    opts: { maxZoom:19, subdomains:'0123' },
  },
  satellite: {
    label: 'Спутник',
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    opts: { maxZoom:19 },
  },
  osm: {
    label: 'OSM',
    url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    opts: { maxZoom:19, subdomains:'abc' },
  },
};
let currentLayer = null;
let currentLayerKey = 'google';

function setTileLayer(key) {
  if (currentLayer) map.removeLayer(currentLayer);
  const cfg = TILE_LAYERS[key];
  currentLayer = L.tileLayer(cfg.url, cfg.opts).addTo(map);
  currentLayerKey = key;
  // update button states
  document.querySelectorAll('.layer-btn').forEach(b => {
    b.classList.toggle('active-layer', b.dataset.layer === key);
  });
  // save preference
  try { localStorage.setItem('fm_layer', key); } catch(e){}
}

// Init tile layer (restore saved preference)
const savedLayer = (()=>{ try{ return localStorage.getItem('fm_layer'); }catch(e){return null;} })();
setTileLayer(TILE_LAYERS[savedLayer] ? savedLayer : 'twogis');

function typeConfig(type, splitterType) {
  switch(type) {
    case 'muff':
      return { color:'#8b7355', label:'МУФТА', badgeBg:'rgba(139,115,85,.2)', badgeColor:'#d4b896' };
    case 'splitter':
      if (splitterType === 'trunk')
        return { color:'#7c3aed', label:'БОК.МАГИСТР.', badgeBg:'rgba(124,58,237,.2)', badgeColor:'#ddd6fe' };
      if (splitterType === 'mixed')
        return { color:'#0891b2', label:'БОК.СМЕШАН.', badgeBg:'rgba(8,145,178,.2)', badgeColor:'#a5f3fc' };
      return { color:'#388bfd', label:'БОК.АБОНЕНТ.', badgeBg:'rgba(56,139,253,.2)', badgeColor:'#cae8ff' };
    case 'off':      return { color:'#e09b3d', label:'ОТКЛ.',   badgeBg:'rgba(224,155,61,.2)',  badgeColor:'#ffddb3' };
    case 'active':   return { color:'#3fb950', label:'АБОНЕНТ', badgeBg:'rgba(63,185,80,.2)',   badgeColor:'#aff5b4' };
    case 'other':    return { color:'#db61a2', label:'ПРОЧЕЕ',  badgeBg:'rgba(219,97,162,.2)',  badgeColor:'#ffd6f0' };
    default:         return { color:'#7d8590', label:'ТОЧКА',   badgeBg:'rgba(125,133,144,.2)', badgeColor:'#ccc' };
  }
}

// Determine effective splitter type for a box point
function boxSplitterType(point) {
  const spls = point.splitters || [];
  if (!spls.length) return 'subscriber';
  const types = [...new Set(spls.map(s=>s.splitterType||'subscriber'))];
  if (types.length > 1) return 'mixed';
  return types[0];
}

// Returns the port status linked to a subscriber point (via subscriberId stored on port)
function getLinkedPortStatus(pointId) {
  if (!currentProj) return null;
  for (const pt of points) {
    if (pt.type !== 'splitter') continue;
    const spls = _getSplitters(pt);
    for (const s of spls) {
      const port = (s.subs||[]).find(p => p.subscriberId === pointId);
      if (port) return port.status;
    }
  }
  return null;
}

function effectiveStatus(p) {
  const linkedStatus = getLinkedPortStatus(p.id);

  if (linkedStatus === 'off_free') return 'off_free';
  if (linkedStatus === 'off') return 'off';
  if (linkedStatus === 'active') return 'active';

  return p.type;
}

function isOffPoint(p) {
  const s = effectiveStatus(p);
  return s === 'off' || s === 'off_free';
}
  
function makeIcon(point) {
  if (point.type === 'muff') {
    const cfg = typeConfig('muff');
    const html = `<div class="fm-marker" style="width:36px;height:36px;background:${cfg.color};border-color:rgba(255,255,255,.9);font-size:13px;color:#fff;">⌀</div>`;
    return L.divIcon({ html, className:'', iconSize:[36,36], iconAnchor:[18,18] });
  }

  if (point.type === 'splitter') {
    const spls  = _getSplitters(point);
    const size  = spls.length > 1 ? 44 : 36;
    const half  = size / 2;

    if (spls.length === 1) {
      // Single splitter — simple circle
      const spl  = spls[0];
      const free = Math.max(0,(spl.portsTotal||0)-(spl.subs||[]).filter(s=>s.status==='active').length);
      const col  = spl.splitterType==='trunk' ? '#7c3aed' : '#388bfd';
      const fs   = String(free).length > 1 ? 11 : 15;
      const html = `<div class="fm-marker" style="width:${size}px;height:${size}px;background:${col};border-color:rgba(255,255,255,.9);font-size:${fs}px;color:#fff;">${free}</div>`;
      return L.divIcon({ html, className:'', iconSize:[size,size], iconAnchor:[half,half] });
    }

    // Multiple splitters — split circle
    const COLS = ['#388bfd','#7c3aed','#0891b2','#059669','#d97706'];
    const pct  = 100 / spls.length;
    const sections = spls.map((spl, i) => {
      const free = Math.max(0,(spl.portsTotal||0)-(spl.subs||[]).filter(s=>s.status==='active').length);
      const col  = spl.splitterType==='trunk' ? '#7c3aed' : COLS[i % COLS.length];
      const fs   = String(free).length > 1 ? 10 : 14;
      return `<div style="
        flex:1;display:flex;align-items:center;justify-content:center;
        background:${col};color:#fff;font-size:${fs}px;font-weight:700;
        ${i===0 ? 'border-radius:'+(half)+'px '+(half)+'px 0 0;' : ''}
        ${i===spls.length-1 ? 'border-radius:0 0 '+(half)+'px '+(half)+'px;' : ''}
        line-height:1;
      ">${free}</div>`;
    }).join('');

    const html = `<div style="
      width:${size}px;height:${size}px;border-radius:50%;
      border:2.5px solid rgba(255,255,255,.9);overflow:hidden;
      display:flex;flex-direction:column;
      box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer;
    ">${sections}</div>`;
    return L.divIcon({ html, className:'', iconSize:[size,size], iconAnchor:[half,half] });
  }

  // off / active / other — plain colored circle, no symbol
  const cfg  = typeConfig(point.type);
  let markerColor = cfg.color;

  // Цвет точки по связанному порту независимо от типа абонента
  const portStatus = getLinkedPortStatus(point.id);
  if (portStatus === 'off_free') markerColor = '#f85149';
  else if (portStatus === 'off') markerColor = '#e09b3d';
  else if (portStatus === 'active') markerColor = '#3fb950';


  const size = 28;
  const html = `<div style="
    width:${size}px;height:${size}px;border-radius:50%;
    background:${markerColor};border:3px solid rgba(255,255,255,.9);
    box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer;
  "></div>`;
  return L.divIcon({ html, className:'', iconSize:[size,size], iconAnchor:[size/2,size/2] });
}

// ── Port helpers (support both old single-splitter and new splitters[] array) ──
function _getSplitters(point) {
  // new format
  if (point.splitters && point.splitters.length) return point.splitters;
  // old format: wrap single splitter
  if (point.type === 'splitter') return [{ splitterType:'subscriber', portsTotal: point.portsTotal||0, subs: point.subs||[] }];
  return [];
}

function freePorts(point) {
  if (point.type !== 'splitter') return 0;
  return _getSplitters(point).reduce((t, spl) => {
    const used = (spl.subs||[]).filter(s=>s.status==='active').length;
    return t + Math.max(0,(spl.portsTotal||0)-used);
  }, 0);
}
function usedPorts(point) {
  return _getSplitters(point).reduce((t, spl) =>
    t + (spl.subs||[]).filter(s=>s.status==='active').length, 0);
}

function renderMarkers() {
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers = {};
  points.forEach(p => {
    if (
      activeFilter !== 'all' &&
      !(
        p.type === activeFilter ||
        (activeFilter === 'off' && isOffPoint(p)) ||
        (activeFilter === 'active' && effectiveStatus(p) === 'active')
      )
    ) return;
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p), draggable: false });
    m.on('click', () => openSidebar(p.id));
    m.addTo(map);
    markers[p.id] = m;
    // Only splitters and muffs can be dragged to reposition or create routes
    if (p.type === 'splitter' || p.type === 'muff') enableDrag(m, p.id);
  });
  renderStats();
}

function refreshMarker(id) {
  const p = getPoint(id);
  if (!p) return;
  if (markers[id]) map.removeLayer(markers[id]);
  if (
    activeFilter !== 'all' &&
    !(
      p.type === activeFilter ||
      (activeFilter === 'off' && isOffPoint(p)) ||
      (activeFilter === 'active' && effectiveStatus(p) === 'active')
    )
  ) return;
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(p), draggable: false });
  m.on('click', () => openSidebar(p.id));
  m.addTo(map);
  markers[id] = m;
  if (p.type === 'splitter' || p.type === 'muff') enableDrag(m, id);
}

// Click on map to add
let tapHintTimeout;
map.on('click', e => {
  if (routeEditMode) return; // don't open modal during route drawing
  if (document.getElementById('modal-overlay').classList.contains('open')) return;
  pendingLatLng = e.latlng;

// ═══════════════════════════════
// ROUTES — кабельные маршруты
// ═══════════════════════════════
let routeLines     = {};   // routeId → L.Polyline (displayed)
let routeEditMode  = false;
let editingRouteId = null;
let routeEditPts   = [];   // [[lat,lng], ...]
let routeEditLine  = null;
let routeEditMarkers = [];
let routeIsNew     = false; // true = новый маршрут, B ещё не добавлена

function getRoutes()      { if(!currentProj.routes) currentProj.routes=[]; return currentProj.routes; }
function saveRoutes()     { save(); }


function routeDistanceMeters(route) {
  if (!route || !route.waypoints || route.waypoints.length < 2) return 0;

  let total = 0;

  for (let i = 1; i < route.waypoints.length; i++) {
    const a = L.latLng(route.waypoints[i - 1][0], route.waypoints[i - 1][1]);
    const b = L.latLng(route.waypoints[i][0], route.waypoints[i][1]);
    total += a.distanceTo(b);
  }

  return total;
}

function formatDistance(meters) {
  if (meters >= 1000) return (meters / 1000).toFixed(2) + ' км';
  return Math.round(meters) + ' м';
}

function totalRoutesDistance() {
  return getRoutes().reduce((sum, r) => sum + routeDistanceMeters(r), 0);
}

function getRoutesForPoint(pid) {
  return getRoutes().filter(r => r.subscriberId===pid || r.splitterId===pid);
}

// ── Display routes ────────────────
function showRoutesForPoint(pid) {
  hideAllRouteLines();
  getRoutesForPoint(pid).forEach(r => drawRouteLine(r, false));
}

function drawRouteLine(route, editing) {
  if (!route.waypoints || route.waypoints.length < 2) return;
  const sub = getPoint(route.subscriberId);
  const col = sub && sub.type==='active' ? '#3fb950' : '#e09b3d';
  if (routeLines[route.id]) map.removeLayer(routeLines[route.id]);
  const line = L.polyline(route.waypoints, {
    color: col, weight: 3,
    dashArray: editing ? '8 5' : null,
    opacity: 0.85,
  }).addTo(map);
  line.on('click', () => startRouteEdit(route.id));
  routeLines[route.id] = line;
}

function hideAllRouteLines() {
  Object.values(routeLines).forEach(l => map.removeLayer(l));
  routeLines = {};
}

// ── Route edit ───────────────────
function startRouteEdit(routeId) {
  if (routeEditMode) cancelRouteEdit();
  const route = getRoutes().find(r => r.id === routeId);
  if (!route) return;
  editingRouteId = routeId;
  routeEditMode  = true;
  routeIsNew     = false; // editing existing — B is fixed

  const sub = getPoint(route.subscriberId);
  const spl = getPoint(route.splitterId);
  routeEditPts = route.waypoints && route.waypoints.length >= 2
    ? JSON.parse(JSON.stringify(route.waypoints))
    : [[sub.lat, sub.lng], [spl.lat, spl.lng]];

  _drawEditLine();
  document.getElementById('route-bar').classList.add('active');
  map._routeClickHandler = e => {
    if (!routeEditMode) return;
    // Insert before last point (B stays at end)
    routeEditPts.splice(routeEditPts.length - 1, 0, [e.latlng.lat, e.latlng.lng]);
    _drawEditLine();
  };
  map.on('click', map._routeClickHandler);
  closeSidebar();
}

function startNewRoute(subscriberId, splitterId) {
  const route = {
    id: 'route_' + Date.now(),
    subscriberId, splitterId,
    waypoints: [],
  };
  getRoutes().push(route);
  saveRoutes();

  // New route: start ONLY from A, B added on finish
  routeIsNew = true;
  editingRouteId = route.id;
  routeEditMode  = true;
  const sub = getPoint(subscriberId);
  routeEditPts = sub ? [[sub.lat, sub.lng]] : [];

  _drawEditLine();
  document.getElementById('route-bar').classList.add('active');
  map._routeClickHandler = e => {
    if (!routeEditMode) return;
    routeEditPts.push([e.latlng.lat, e.latlng.lng]); // append to end
    _drawEditLine();
  };
  map.on('click', map._routeClickHandler);
  closeSidebar();
}

function _drawEditLine() {
  if (routeEditLine) map.removeLayer(routeEditLine);
  routeEditMarkers.forEach(m => map.removeLayer(m));
  routeEditMarkers = [];

  routeEditLine = L.polyline(routeEditPts, {
    color:'#3fb950', weight:3, dashArray:'8 5',
  }).addTo(map);

  routeEditPts.forEach((pt, i) => {
    // For new routes: only A (i=0) is a fixed endpoint — no B yet
    // For existing: A (i=0) and B (last) are fixed
    const isEndpoint = routeIsNew
      ? i === 0
      : (i === 0 || i === routeEditPts.length - 1);
    const color = isEndpoint ? '#3fb950' : '#ffb84d';
    const size  = isEndpoint ? 14 : 12;

    const icon = L.divIcon({
      html: `<div style="
        width:${size}px;height:${size}px;border-radius:50%;
        background:${color};border:2.5px solid #fff;
        box-shadow:0 1px 5px rgba(0,0,0,.5);
        cursor:${isEndpoint?'default':'move'};
      "></div>`,
      className: '',
      iconSize:   [size, size],
      iconAnchor: [size/2, size/2],
    });

    const m = L.marker([pt[0], pt[1]], {
      icon,
      draggable: !isEndpoint,
      zIndexOffset: 100,
    }).addTo(map);

    if (!isEndpoint) {
      // Drag — update coordinate in real time
      m.on('drag', e => {
        const ll = e.target.getLatLng();
        routeEditPts[i] = [ll.lat, ll.lng];
        routeEditLine.setLatLngs(routeEditPts);
      });

      // Double-click — delete this waypoint
      m.on('dblclick', e => {
        L.DomEvent.stopPropagation(e);
        routeEditPts.splice(i, 1);
        _drawEditLine();
      });

      // Prevent map click when clicking waypoint
      m.on('click', e => L.DomEvent.stopPropagation(e));
    }

    routeEditMarkers.push(m);
  });
}

function undoRoutePoint() {
  if (routeIsNew) {
    // Remove last added point (keep A as minimum)
    if (routeEditPts.length > 1) { routeEditPts.pop(); _drawEditLine(); }
  } else {
    // Remove point before B (keep A and B)
    if (routeEditPts.length > 2) { routeEditPts.splice(routeEditPts.length - 2, 1); _drawEditLine(); }
  }
}

function clearRoutePoints() {
  const route = getRoutes().find(r => r.id === editingRouteId);
  const sub = route ? getPoint(route.subscriberId) : null;
  const spl = route ? getPoint(route.splitterId)   : null;
  if (routeIsNew) {
    routeEditPts = sub ? [[sub.lat, sub.lng]] : [];
  } else {
    routeEditPts = (sub && spl) ? [[sub.lat, sub.lng],[spl.lat, spl.lng]] : routeEditPts.slice(0,2);
  }
  _drawEditLine();
}

function finishRouteEdit() {
  const route = getRoutes().find(r => r.id === editingRouteId);
  if (route) {
    let pts = JSON.parse(JSON.stringify(routeEditPts));
    if (routeIsNew) {
      const spl = getPoint(route.splitterId);
      if (spl) pts.push([spl.lat, spl.lng]);

      // Auto-populate first free port in splitter with subscriber info
      const sub = getPoint(route.subscriberId);
      if (sub && spl && spl.type === 'splitter') {
        const spls = _getSplitters(spl);
        let filled = false;
        for (let si = 0; si < spls.length && !filled; si++) {
          const s = spls[si];
          const fi = (s.subs||[]).findIndex(p => p.status === 'free');
          if (fi >= 0) {
            const port = s.subs[fi];
            port.status       = sub.type === 'active' ? 'active' : 'off';
            port.address      = (sub.name||'').trim();
            port.person       = (sub.name||'').trim();
            port.subscriberId = route.subscriberId; // link for marker sync
            if (sub.signal) port.signal = sub.signal;
            // write back
            if (spl.splitters && spl.splitters[si]) {
              spl.splitters[si].subs[fi] = port;
            }
            filled = true;
          }
        }
        if (filled) refreshMarker(spl.id);
      }
    }
    route.waypoints = pts;
    saveRoutes();
  }
  const pid = route ? (route.subscriberId || route.splitterId) : null;
  _cleanupRouteEdit();
  if (route) { drawRouteLine(route, false); if (pid) openSidebar(pid); }
}

function cancelRouteEdit() { _cleanupRouteEdit(); }

function _cleanupRouteEdit() {
  if (map._routeClickHandler) { map.off('click', map._routeClickHandler); map._routeClickHandler = null; }
  if (routeEditLine) { map.removeLayer(routeEditLine); routeEditLine = null; }
  routeEditMarkers.forEach(m => map.removeLayer(m)); routeEditMarkers = [];
  routeEditMode = false; routeIsNew = false; editingRouteId = null; routeEditPts = [];
  document.getElementById('route-bar').classList.remove('active');
}

function deleteRoute(routeId) {
  if (routeLines[routeId]) { map.removeLayer(routeLines[routeId]); delete routeLines[routeId]; }
  if (currentProj) currentProj.routes = getRoutes().filter(r=>r.id!==routeId);
  saveRoutes();
}

// ── Pick target point for route (any type) ──
let _pickingTargetFor = null;

function startPickTarget(fromId) {
  _pickingTargetFor = fromId;
  closeSidebar();
  showLocToast('👆 Нажмите на любую точку на карте — она станет концом маршрута');
  // Temporarily override marker clicks
  Object.keys(markers).forEach(pid => {
    const m = markers[pid];
    if (!m || pid === fromId) return;
    m._origClick = m._events?.click?.[0]?.fn;
    m.off('click');
    m.on('click', () => {
      _finishPickTarget(pid);
    });
  });
  // Cancel on map click (not on marker)
  map._pickCancelHandler = () => {
    if (_pickingTargetFor) _cancelPickTarget();
  };
  // Use a short delay so this click doesn't immediately trigger cancel
  setTimeout(() => map.on('click', map._pickCancelHandler), 300);
}

function _finishPickTarget(toId) {
  const fromId = _pickingTargetFor;
  _cancelPickTarget();
  if (fromId && toId && fromId !== toId) offerLinkToPoint(fromId, toId);
}

function _cancelPickTarget() {
  _pickingTargetFor = null;
  if (map._pickCancelHandler) { map.off('click', map._pickCancelHandler); map._pickCancelHandler = null; }
  // Restore original marker clicks
  Object.keys(markers).forEach(pid => {
    const m = markers[pid];
    if (!m) return;
    m.off('click');
    m.on('click', () => openSidebar(pid));
  });
}
function enableDrag(marker, pointId) {
  marker.dragging.enable();
  let dragHighlightId = null;

  marker.on('drag', e => {
    const pos = e.latlng;
    let nearest = null, minD = Infinity;
    points.forEach(sp => {
      if (sp.id === pointId) return; // skip self
      const sd = map.latLngToContainerPoint([sp.lat, sp.lng]);
      const dd = map.latLngToContainerPoint(pos);
      const d  = Math.hypot(sd.x-dd.x, sd.y-dd.y);
      if (d < 50 && d < minD) { minD = d; nearest = sp; }
    });
    // Update highlight
    if (dragHighlightId && dragHighlightId !== nearest?.id) {
      markers[dragHighlightId]?.getElement()?.querySelector('.fm-marker')?.classList.remove('drag-over');
      dragHighlightId = null;
    }
    if (nearest) {
      markers[nearest.id]?.getElement()?.querySelector('.fm-marker')?.classList.add('drag-over');
      dragHighlightId = nearest.id;
    }
  });

  marker.on('dragend', e => {
    if (dragHighlightId) {
      markers[dragHighlightId]?.getElement()?.querySelector('.fm-marker')?.classList.remove('drag-over');
    }
    const pos = e.target.getLatLng();
    const p = getPoint(pointId);
    if (p) { p.lat = pos.lat; p.lng = pos.lng; save(); }

    // Find nearest any-type point within 50px
    let nearest = null, minD = Infinity;
    points.forEach(sp => {
      if (sp.id === pointId) return;
      const sd = map.latLngToContainerPoint([sp.lat, sp.lng]);
      const dd = map.latLngToContainerPoint(pos);
      const d  = Math.hypot(sd.x-dd.x, sd.y-dd.y);
      if (d < 50 && d < minD) { minD = d; nearest = sp; }
    });

    dragHighlightId = null;
    if (nearest) offerLinkToPoint(pointId, nearest.id);
  });
}

function offerLinkToPoint(fromId, toId) {
  const from = getPoint(fromId);
  const to   = getPoint(toId);
  if (!from || !to) return;

  // Check if route already exists between these two
  const existing = getRoutes().find(r =>
    (r.subscriberId===fromId && r.splitterId===toId) ||
    (r.subscriberId===toId   && r.splitterId===fromId)
  );

  const typeLabel = t => t==='splitter'?'Бокс':t==='muff'?'Муфта':t==='active'?'Абонент':'Откл.';
  const fromLabel = `${typeLabel(from.type)}: ${from.name||'—'}`;
  const toLabel   = `${typeLabel(to.type)}: ${to.name||'—'}`;

  pdlgShow(
    existing ? 'Изменить маршрут?' : 'Создать маршрут?',
    `${fromLabel} → ${toLabel}`,
    '', existing ? 'Перестроить' : 'Нарисовать маршрут', false,
    () => {
      if (existing) deleteRoute(existing.id);
      startNewRoute(fromId, toId);
    }
  );
}

function routeHtmlForPoint(pid) {
  const routes = getRoutesForPoint(pid);
  if (!routes.length) return '';
  let html = `<div class="subs-title" style="margin-bottom:6px">🔌 Кабельный маршрут</div>`;
  routes.forEach(r => {
    const other = r.subscriberId===pid ? getPoint(r.splitterId) : getPoint(r.subscriberId);
    const pts   = r.waypoints ? r.waypoints.length : 0;
    const col   = other && other.type==='splitter' ? '#388bfd' : other && other.type==='muff' ? '#8b7355' : '#7d8590';
    html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">→ ${other?other.name:'?'}</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px">${pts} точек · ${pts>2?'произвольный маршрут':'прямая линия'}</div>
        </div>
        <button onclick="startRouteEdit('${r.id}')" style="background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:#3fb950;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;white-space:nowrap">✏️ Редакт.</button>
        <button onclick="deleteRoute('${r.id}');openSidebar('${pid}')" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.2);color:#f85149;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:12px;">🗑</button>
      </div>
    </div>`;
  });
  return html;
}
function renderStats() {
  const totalKm = formatDistance(totalRoutesDistance());
  const splitters  = points.filter(p=>p.type==='splitter');
  const muffs      = points.filter(p=>p.type==='muff');
  const totalFree  = splitters.reduce((a,p)=>a+freePorts(p),0);
  const offList    = points.filter(p => isOffPoint(p));
  const activeList = points.filter(p => effectiveStatus(p) === 'active');

  const chips = [
    { label:'Все',    val: points.length,    dot:'#7d8590', filter:'all'      },
    { label:'боксы',  val: splitters.length,  dot:'#388bfd', filter:'splitter' },
    { label:'муфты',  val: muffs.length,      dot:'#8b7355', filter:'muff'     },
    { label:'своб.',  val: totalFree,         dot:'#3fb950', filter:'free'     },
    { label:'откл.',  val: offList.length,    dot:'#e09b3d', filter:'off'      },
    { label:'актив.', val: activeList.length, dot:'#3fb950', filter:'active'   },
  ];

  document.getElementById('stats-bar').innerHTML = chips.map(c=>`
    <div class="stat-chip" onclick="openListPanel('${c.filter}')" style="color:${c.dot}">
      <span class="dot" style="background:${c.dot}"></span>
      <span class="val" style="color:var(--text)">${c.val}</span>
      <span class="lbl">${c.label}</span>
    </div>`).join('');
}

// ═══════════════════════════════
// LIST PANEL
// ═══════════════════════════════
const LIST_META = {
  all:      { title:'Все точки',          dot:'#7d8590' },
  splitter: { title:'Сплиттеры',          dot:'#388bfd' },
  muff:     { title:'Муфты',              dot:'#8b7355' },
  free:     { title:'Свободные порты',    dot:'#3fb950' },
  off:      { title:'Отключённые',        dot:'#e09b3d' },
  active:   { title:'Активные абоненты',  dot:'#3fb950' },
};

function getFilteredList(filter) {
  if (filter === 'all')      return [...points];
  if (filter === 'splitter') return points.filter(p=>p.type==='splitter');
  if (filter === 'muff')     return points.filter(p=>p.type==='muff');

  if (filter === 'off') {
    return points.filter(p => isOffPoint(p));
  }

  if (filter === 'active') {
    return points.filter(p => effectiveStatus(p) === 'active');
  }

  if (filter === 'free') {
    return points.filter(p=>p.type==='splitter' && freePorts(p)>0);
  }

  return [...points];
}

function openListPanel(filter) {
  // close sidebar if open
  closeSidebar();

  const meta    = LIST_META[filter] || LIST_META.all;
  const list    = getFilteredList(filter);
  document.getElementById('lp-title').textContent = meta.title;
  document.getElementById('lp-count').textContent = list.length + ' шт.';

  const body = document.getElementById('lp-body');
  if (!list.length) {
    body.innerHTML = `<div class="lp-empty">Нет точек в этой категории</div>`;
  } else {
    body.innerHTML = list.map(p=>{
      const cfg = typeConfig(p.type);
      let meta2 = '';
      if (p.type === 'splitter') {
        const free = freePorts(p);
        const used = usedPorts(p);
        meta2 = `Портов: ${p.portsTotal||0} · своб. ${free} · актив. ${used}`;
      } else if (p.comment) {
        meta2 = p.comment.length > 50 ? p.comment.slice(0,50)+'…' : p.comment;
      }
      const badge = p.type==='splitter'
        ? `<div class="lp-badge" style="background:${cfg.badgeBg};color:${cfg.badgeColor}">${freePorts(p)} своб.</div>`
        : `<div class="lp-badge" style="background:${cfg.badgeBg};color:${cfg.badgeColor}">${cfg.label}</div>`;
      return `<div class="lp-item" onclick="selectFromList('${p.id}')">
        <div class="lp-dot" style="background:${cfg.color}"></div>
        <div class="lp-info">
          <div class="lp-name">${p.name||'—'}</div>
          ${meta2?`<div class="lp-meta">${meta2}</div>`:''}
        </div>
        ${badge}
      </div>`;
    }).join('');
  }

  document.getElementById('list-panel').classList.add('open');
}

function closeListPanel() {
  document.getElementById('list-panel').classList.remove('open');
}

function selectFromList(id) {
  closeListPanel();
  const p = getPoint(id);
  if (p) map.setView([p.lat, p.lng], 17, {animate:true});
  setTimeout(()=>openSidebar(id), 200);
}

const _sbShowFree = {}; // {`${pointId}-${splIdx}` : bool}

function renderPortList(point, si, showFree) {

    if (s.status === 'free' && !showFree) return;

    const sc  = s.status==='active'?'#3fb950':s.status==='off'?'#e09b3d':s.status==='off_free'?'#f85149':'#388bfd';
    const sl  = s.status==='active'?'актив':s.status==='off'?'откл.+порт':s.status==='off_free'?'откл.':  'своб.';
    const sk  = s.status==='active'?'status-active':s.status==='off'?'status-off':s.status==='off_free'?'status-off-free':'status-free';
    const fc  = fiberColorInfo(s.fiberColor);
    const fh  = fc?fc.hex:null, fn=fc?fc.name:'';
    const ad  = (s.address||'').trim(), pe=(s.person||'').trim();
    const ml  = ad&&pe?`${ad} / ${pe}`:ad||pe||'— свободен —';
    const pid = point.id;
    html += `
    <div class="sub-item" id="port-row-${pid}-${si}-${pi}">
      <div class="sub-dot" style="background:${sc}"></div>
      <div class="sub-info" style="flex:1;min-width:0">
        <div class="sub-name" style="font-size:13px;line-height:1.35">${ml}</div>
        <div class="sub-meta" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px">
          <span>Порт ${s.port}</span>
          ${fn?`<span style="display:inline-flex;align-items:center;gap:3px;"><span style="width:8px;height:8px;border-radius:50%;background:${fh};display:inline-block;border:1px solid rgba(255,255,255,.2)"></span><span style="color:${fh};font-weight:600">${fn}</span></span>`:''}
          ${s.phone?`<span>· ${s.phone}</span>`:''}
          ${signalBadge(s.signal)}
        </div>
      </div>
      <div class="sub-status ${sk}">${sl}</div>
      <div style="display:flex;gap:4px;margin-left:6px;flex-shrink:0">
        <button onclick="sbEditPort('${pid}',${si},${pi})"
          style="background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:3px 7px;cursor:pointer;font-size:13px;">✏️</button>
        <button onclick="sbDeletePort('${pid}',${si},${pi})"
          style="background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);color:#f85149;border-radius:6px;padding:3px 7px;cursor:pointer;font-size:13px;">🗑</button>
      </div>
    </div>`;
  });

  if (!html) {
    html = `<div style="font-size:12px;color:var(--dim);padding:8px 0;text-align:center">
      ${showFree ? 'Нет портов' : 'Нет активных/отключённых портов'}
    </div>`;
  }
  return html;
}

function sbToggleFree(pid, si) {
  const key = `${pid}-${si}`;
  _sbShowFree[key] = !_sbShowFree[key];
  const show = _sbShowFree[key];
  const p = getPoint(pid);
  document.getElementById(`spl-ports-${pid}-${si}`).innerHTML = renderPortList(p, si, show);
  const btn = document.getElementById(`btn-free-${pid}-${si}`);

}

          style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;min-width:0">
        <input id="ep-ph-${pi}" type="text" value="${s.phone||''}" placeholder="тел."
          style="width:90px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--dim);font-size:12px;outline:none">
      </div>

        <span style="font-size:11px;color:var(--dim)">dBm</span>
        ${_sigColorPicker('ep-sigc-'+pi, typeof s.signal==='object'?s.signal?.color:'#3fb950')}
        <span id="ep-sig-col-${pi}">${signalBadge(s.signal)}</span>
      </div>
      <div style="display:flex;gap:6px;padding-left:24px">
        <button onclick="sbSavePort('${pid}',${si},${pi})"
          style="flex:1;background:#388bfd;border:none;color:#fff;border-radius:6px;padding:6px;cursor:pointer;font-size:12px;font-weight:600;">✓ Сохранить</button>
        <button onclick="sbCancelEdit('${pid}',${si},${pi})"
          style="flex:1;background:var(--card);border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:6px;cursor:pointer;font-size:12px;">Отмена</button>
      </div>
    </div>`;
}

// Signal color picker HTML snippet
function _sigColorPicker(id, selected) {
  const cols = [
    {c:'#3fb950', label:'🟢'},
    {c:'#e09b3d', label:'🟠'},
    {c:'#f85149', label:'🔴'},
  ];
  return `<span id="${id}" style="display:inline-flex;gap:3px;">` +
    cols.map(({c, label}) =>
      `<button onclick="_sigPickCol('${id}','${c}')"
        style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;
        border:3px solid ${selected===c?'#fff':'transparent'};
        box-shadow:${selected===c?'0 0 0 1px '+c:'none'};
        font-size:0;transition:border .1s;" title="${c}"></button>`
    ).join('') + `</span>`;
}
function _sigPickCol(wrapperId, color) {
  const el = document.getElementById(wrapperId);
  if (!el) return;
  el.querySelectorAll('button').forEach(b => {
    const bc = b.style.background;
    b.style.border = bc === color || b.style.backgroundColor === color ? '3px solid #fff' : '3px solid transparent';
    b.style.boxShadow = (bc === color || b.style.backgroundColor === color) ? '0 0 0 1px '+bc : 'none';
  });
  el.dataset.selected = color;
}
function _sigGetCol(wrapperId, fallback) {
  const el = document.getElementById(wrapperId);
  return el?.dataset?.selected || fallback || '#3fb950';
}

// ── Splitter-level signal ────────
function sbToggleSplitterSig(pid, si) {
  const el = document.getElementById(`spl-sig-edit-${pid}-${si}`);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function sbSplitterSigPreview(pid, si) {

  const el  = document.getElementById(`spl-sig-prev-${pid}-${si}`);

function sbSaveSplitterSig(pid, si) {
  const p   = getPoint(pid);
  if (!p) return;
  const spls = _getSplitters(p);

function sbCancelSplitterSig(pid, si) {

}

function sbUpdateSignalColor(pi) {
  const v    = document.getElementById(`ep-sig-${pi}`)?.value;

  const el   = document.getElementById(`ep-sig-col-${pi}`);

// Subscriber point signal editing
function sbToggleSignalEdit(pid) {
  const el = document.getElementById(`pt-sig-edit-${pid}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function ptUpdateSigBadge(pid) {
